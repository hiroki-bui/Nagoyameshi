version: 0.2

env:
  variables:
    IMAGE_TAG: latest

phases:
  pre_build:
    commands:
      - echo Logging in to DockerHub...
      - echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - echo Logging in to Amazon ECR...
      - aws --version
      - aws ecr get-login-password --region ap-northeast-1 | docker login --username AWS --password-stdin $REPOSITORY_URI

  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      - docker build -f Dockerfile.deployment -t $REPOSITORY_URI:$IMAGE_TAG .
      - docker tag $REPOSITORY_URI:$IMAGE_TAG $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker image...
      - docker push $REPOSITORY_URI:$IMAGE_TAG

      - echo Running migration via ECS exec...
      - |
        TASK_ID=$(aws ecs list-tasks \
          --cluster "$ECS_CLUSTER_NAME" \
          --service-name "$ECS_SERVICE_NAME" \
          --desired-status RUNNING \
          --query "taskArns[0]" \
          --output text)

        echo "Found task: $TASK_ID"

        aws ecs execute-command \
          --cluster "$ECS_CLUSTER_NAME" \
          --task "$TASK_ID" \
          --container "$CONTAINER_NAME" \
          --command "php artisan migrate --force" \
          --interactive

      - echo Writing imagedefinitions.json for ECS...
      - printf '[{"name":"%s","imageUri":"%s"}]' "$CONTAINER_NAME" "$REPOSITORY_URI:$IMAGE_TAG" > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
